version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cybergate
      POSTGRES_PASSWORD: cybergate
      POSTGRES_DB: cybergate
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports: ["5432:5432"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  api:
    build: ./backend
    depends_on: [postgres, redis]
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://cybergate:cybergate@postgres:5432/cybergate
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_me_generate_a_64_char_random_secret________________________________
      ADMIN_EMAIL: admin@cybergate.local
      ADMIN_PASSWORD: ChangeMe123!
      GATEWAY_DOMAIN: localhost
      CORS_ORIGIN: http://localhost:3000
    ports: ["8080:8080"]
  dashboard:
    build: ./dashboard
    depends_on: [api]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
      NEXT_PUBLIC_GATEWAY_DOMAIN: localhost
    ports: ["3000:3000"]
volumes:
  pg_data:
